# =====================================================
# Evolution API (WhatsApp) — Coolify Docker Compose
# Use this in Coolify → New Resource → Docker Compose
# Domain: wa.qareeblak.com
# =====================================================

services:
  evolution-api:
    image: atendai/evolution-api:v2.2.3
    container_name: evolution-api
    restart: always
    volumes:
      - evolution_instances:/evolution/instances
    environment:
      SERVER_URL: "https://wa.qareeblak.com"
      AUTHENTICATION_TYPE: "apikey"
      # Must match EVOLUTION_API_KEY in your backend .env
      AUTHENTICATION_API_KEY: "${EVOLUTION_API_KEY}"
      DATABASE_ENABLED: "false"
      CACHE_REDIS_ENABLED: "false"
      LOG_LEVEL: "ERROR"
      DEL_INSTANCE: "false"
      LANGUAGE: "ar"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  evolution_instances:
    name: evolution_instances
