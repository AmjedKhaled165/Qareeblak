name: qareeblak_mobile
description: "قريبلك - تطبيق الخدمات المحلية والتوصيل السريع"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_animate: ^4.2.0+1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  flutter_svg: ^2.0.7

  # State Management & Data
  provider: ^6.1.0
  riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # HTTP & API
  dio: ^5.3.1
  http: ^1.1.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Authentication
  firebase_core: ^2.24.0
  firebase_auth: ^4.16.0
  google_sign_in: ^6.1.5

  # Location & Maps
  geolocator: ^9.0.2
  google_maps_flutter: ^2.5.0

  # Real-time
  socket_io_client: ^2.0.1

  # Notifications
  firebase_messaging: ^14.7.0
  flutter_local_notifications: ^16.3.0

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.0
  cached_network_image: ^3.3.0
  lottie: ^2.4.0

  # Animations
  rive: ^0.12.0

  # Image Picker
  flutter_fortune_wheel: ^1.3.0
  image_picker: ^1.0.7
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.0
  riverpod_generator: ^2.3.0
  json_serializable: ^6.7.1
  json_annotation: ^4.8.1

flutter:
  uses-material-design: true

