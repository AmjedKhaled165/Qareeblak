# ============================================================
# Qareeblak — Production Nginx Configuration
# WAF-ready: Rate limiting, bot blocking, request size limits
# ============================================================

# Upstream: Node.js API cluster (PM2 / Docker)
upstream qareeblak_api {
    least_conn;
    server 127.0.0.1:5000;
    keepalive 64;
}

# ─── Rate Limiting Zones ────────────────────────────────────
# Shared memory zones for distributed rate limiting at the edge

# General API: 20 requests/second per IP
limit_req_zone $binary_remote_addr zone=api_limit:20m rate=20r/s;

# Auth endpoints: 2 requests/second per IP (strict brute-force defense)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=2r/s;

# Webhook: 5 req/sec (Evolution API callbacks only)
limit_req_zone $binary_remote_addr zone=webhook_limit:5m  rate=5r/s;

# ─── Redirect HTTP → HTTPS ──────────────────────────────────
server {
    listen 80;
    server_name qareeblak.com www.qareeblak.com;

    # ACME challenge for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Main Server ──────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name qareeblak.com www.qareeblak.com;

    # TLS Certificate (managed by Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/qareeblak.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qareeblak.com/privkey.pem;

    # Modern TLS: TLS 1.2+ only
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS: force HTTPS for 2 years, include subdomains
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # OCSP Stapling: faster TLS handshake
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers (defense-in-depth alongside Helmet in Node.js)
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header X-Frame-Options          "SAMEORIGIN"        always;
    add_header X-XSS-Protection         "1; mode=block"     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;

    # ─── Request Size Limits ──────────────────────────────────
    # Block body-flooding DoS attacks at the edge
    client_max_body_size        10m;
    client_body_timeout         30s;
    client_header_timeout       30s;
    send_timeout                30s;

    # ─── Block Bad User Agents ────────────────────────────────
    # Common vulnerability scanners, SQL injection tools, bots
    if ($http_user_agent ~* (sqlmap|nikto|masscan|nmap|zgrab|nessus|openvas|dirbuster|hydra|metasploit)) {
        return 403;
    }

    # ─── API Proxy ────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass          http://qareeblak_api;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade            $http_upgrade;
        proxy_set_header    Connection         "upgrade";
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;

        # Propagate / generate Request ID for distributed tracing
        proxy_set_header    X-Request-ID       $request_id;

        # Hide upstream error details from clients
        proxy_hide_header   X-Powered-By;

        # Timeouts
        proxy_connect_timeout   10s;
        proxy_send_timeout      30s;
        proxy_read_timeout      60s;
    }

    # ─── Auth Endpoints (extra strict limit) ─────────────────
    location ~ ^/api/auth/(login|register|forgot-password) {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass          http://qareeblak_api;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_set_header    X-Request-ID       $request_id;
    }

    # ─── Webhook (Evolution API only) ────────────────────────
    location /api/whatsapp/webhook {
        limit_req zone=webhook_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass          http://qareeblak_api;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
    }

    # ─── WebSocket (Socket.io) ────────────────────────────────
    location /socket.io/ {
        proxy_pass          http://qareeblak_api;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade     $http_upgrade;
        proxy_set_header    Connection  "upgrade";
        proxy_set_header    Host        $host;
        proxy_set_header    X-Real-IP   $remote_addr;
        proxy_read_timeout  86400s;  # Keep WebSocket alive for long sessions
    }

    # ─── Health Check (internal only) ─────────────────────────
    location /api/health {
        # Restrict health endpoint to trusted IPs only in prod
        # allow 10.0.0.0/8;  # Internal VPC
        # deny all;
        proxy_pass http://qareeblak_api;
    }

    # Block direct access to dot files and sensitive paths
    location ~ /\. { deny all; }
    location ~ \.(env|sql|log|sh|ps1)$ { deny all; }

    # ─── Gzip Compression ─────────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types        application/json application/javascript text/css text/plain;
    gzip_vary         on;
}
