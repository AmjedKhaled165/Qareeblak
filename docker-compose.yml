version: '3.8'

services:
  api:
    build: 
      context: ./server
      dockerfile: Dockerfile
    image: qareeblak-backend:latest
    container_name: qareeblak-api-prod
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - DB_MAX_CONNECTIONS=90
      - JWT_SECRET=${JWT_SECRET}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - qareeblak-network

  db:
    image: postgres:15-alpine
    container_name: qareeblak-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-qareeblak}
    ports:
      - "127.0.0.1:5432:5432" # Strict mapping to localhost only for security
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql # Auto applies schema on first run
    command: postgres -c max_connections=200 -c shared_buffers=1GB -c work_mem=16MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-qareeblak}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qareeblak-network

  redis:
    image: redis:7-alpine
    container_name: qareeblak-redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1 --loglevel warning
    ports:
      - "127.0.0.1:6379:6379" # Bound securely to local host
    volumes:
      - redisdata:/data
    networks:
      - qareeblak-network

volumes:
  pgdata:
  redisdata:

networks:
  qareeblak-network:
    driver: bridge
